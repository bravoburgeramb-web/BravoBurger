<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BravoBurger - Elige tu Pedido</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Bienvenido a BravoBurger</h1>
        <p>¡Selecciona cómo deseas recibir tu pedido!</p>
    </header>

    <section id="seleccion">
        <!-- Opción de Domicilio -->
        <div class="opcion" id="domicilio" onclick="seleccionarOpcion('domicilio')">
            <img src="images/whatsapp-delivery.jpg" alt="Domicilio">
            <h2>Domicilio</h2>
            <p>Recibe tu pedido en casa</p>
        </div>

        <!-- Opción de Recoger en el Local -->
        <div class="opcion" id="recoger" onclick="seleccionarOpcion('recoger')">
            <img src="images/pickup-local.jpg" alt="Recoger en el local">
            <h2>Recoger en el Local</h2>
            <p>Recoge tu pedido directamente</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 BravoBurger</p>
    </footer>

    <script src="script-menu.js"></script> <!-- Cambié el nombre aquí -->
</body>
</html>
